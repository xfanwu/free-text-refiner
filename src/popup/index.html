<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Refine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Serif+4:opsz@8..60&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b14;
      --bg-surface: #141425;
      --bg-elevated: #1c1c33;
      --bg-input: #111122;
      --text: #e8e3d8;
      --text-muted: #8a8478;
      --text-dim: #5a5650;
      --accent: #e8a840;
      --accent-glow: rgba(232, 168, 64, 0.15);
      --border: #2a2a3e;
      --border-focus: rgba(232, 168, 64, 0.4);
      --error-bg: #2d1a1a;
      --error-text: #f4a0a0;
      --radius: 10px;
      --radius-sm: 6px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(232, 168, 64, 0.03) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(120, 100, 200, 0.04) 0%, transparent 60%);
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .container {
      position: relative;
      padding: 20px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .settings-link {
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-weight: 500;
      transition: color var(--transition);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
    }

    .settings-link:hover {
      color: var(--accent);
      background: rgba(232, 168, 64, 0.06);
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      font-size: 15px;
      line-height: 1.65;
      resize: vertical;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    textarea::placeholder {
      color: var(--text-dim);
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 13px;
    }

    textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px var(--accent-glow);
    }

    .char-count {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    button.primary {
      width: 100%;
      padding: 11px 0;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #0b0b14;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
      position: relative;
      overflow: hidden;
    }

    button.primary:hover {
      background: #f0b850;
      box-shadow: 0 4px 24px rgba(232, 168, 64, 0.3);
      transform: translateY(-1px);
    }

    button.primary:active {
      transform: translateY(0);
    }

    button.primary:disabled {
      background: #4a4a30;
      color: #888;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(11, 11, 20, 0.2);
      border-top-color: #0b0b14;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      display: none;
      padding: 10px 14px;
      background: var(--error-bg);
      border: 1px solid rgba(244, 160, 160, 0.2);
      border-radius: var(--radius);
      color: var(--error-text);
      font-size: 12px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }

    .error.visible {
      display: block;
    }

    .result {
      display: none;
      flex-direction: column;
      gap: 10px;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .result.visible {
      display: flex;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-divider {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-divider::before,
    .result-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }

    .result-divider span {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .result-box {
      padding: 14px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .btn-secondary {
      flex: 1;
      padding: 8px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Text <span>Refine</span></h1>
      <a href="#" class="settings-link" id="open-settings">Settings</a>
    </div>
    <div class="input-wrapper">
      <textarea id="input-text" placeholder="Paste or type text to refine…" maxlength="8000"></textarea>
      <span class="char-count"><span id="char-count">0</span> / 8000</span>
    </div>
    <button class="primary" id="refine-btn">Refine</button>
    <div class="error" id="error-msg"></div>
    <div class="result" id="result-area">
      <div class="result-divider"><span>Refined</span></div>
      <div class="result-box" id="result-text"></div>
      <div class="result-actions">
        <button class="btn-secondary" id="copy-btn">Copy</button>
      </div>
    </div>
  </div>
  <script src="index.js" type="module"></script>
</body>
</html>
