<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Text Refiner Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b14;
      --bg-surface: #141425;
      --bg-input: #111122;
      --text: #e8e3d8;
      --text-muted: #8a8478;
      --text-dim: #5a5650;
      --accent: #d946ef;
      --accent-glow: rgba(217, 70, 239, 0.15);
      --border: #2a2a3e;
      --border-focus: rgba(217, 70, 239, 0.4);
      --success: #6fb06f;
      --error: #f4a0a0;
      --radius: 10px;
      --radius-sm: 6px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(217, 70, 239, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 30% 20% at 80% 100%, rgba(192, 132, 252, 0.04) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 32px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px var(--accent-glow);
    }

    input::placeholder {
      color: var(--text-dim);
    }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 5px;
      line-height: 1.5;
    }

    .form-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      padding: 9px 24px;
      background: linear-gradient(135deg, #c084fc, #e879f9);
      color: #0b0b14;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition);
    }

    button:hover {
      background: linear-gradient(135deg, #d4a0ff, #f09eff);
      box-shadow: 0 4px 16px rgba(217, 70, 239, 0.3);
    }

    #status {
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #status.visible { opacity: 1; }
    #status.success { color: var(--success); }
    #status.error { color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Free Text <span>Refiner</span> Settings</h1>
    <form id="settings-form">
      <div class="form-group">
        <label for="baseUrl">API Base URL</label>
        <input type="url" id="baseUrl" placeholder="https://api.openai.com/v1" autocomplete="off">
        <div class="hint">OpenAI-compatible API endpoint.</div>
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
        <div class="hint">Stored locally — never leaves your machine.</div>
      </div>
      <div class="form-group">
        <label for="model">Model</label>
        <input type="text" id="model" placeholder="gpt-3.5-turbo" autocomplete="off">
        <div class="hint">e.g. gpt-4, gpt-3.5-turbo, deepseek-v4-pro.</div>
      </div>
      <div class="form-footer">
        <button type="submit">Save</button>
        <span id="status">Saved</span>
      </div>
    </form>
  </div>
  <script src="index.js" type="module"></script>
</body>
</html>
